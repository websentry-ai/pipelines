name: Build and Deploy EKS

# Builds the pipelines image and pushes it to ECR (k8s/pipelines), then (only on
# explicit dispatch) restarts the prod Deployment to pull it. Mirrors the
# skillshield deploy pattern; pipelines is prod-only on EKS and STATELESS (no
# migrate step).
#
#   PR                → build-only (proves the Dockerfile builds; no push)
#   push to main      → build + push :sha ONLY (:prod NOT moved, no deploy)
#   workflow_dispatch → build + push :sha → advance :prod → rollout
#                       (rollout=false ⇒ build + push :sha only, no deploy)
#
# Auth: GitHub OIDC -> AWS IAM role unbound-dev-gha-ci.
# Deploy model: ArgoCD owns the manifests (image :prod, pullPolicy Always); CI
# advances the mutable :prod tag + rollout restarts. :sha is immutable (rollback
# handle). :prod is advanced ONLY on the deploy path, AFTER the image builds — so
# under pullPolicy: Always, no incidental restart pulls an untested image between
# a merge and its deploy.
#
# Bootstrap (first go-live): merge the ArgoCD app so the Deployment is created
# (pods ImagePullBackOff — :prod doesn't exist yet, harmless: private + idle),
# then run a workflow_dispatch (rollout=true) to create :prod + roll the pods.
#
# SUPPLY-CHAIN: third-party actions are pinned to full commit SHAs (immutable) —
# a moved/retargeted tag can't inject code into this privileged (id-token: write
# + AWS role) path. The `# vN` comment is the human-readable version; bump via
# Dependabot/Renovate, never by editing the tag.

on:
  push:
    branches: [main]
    paths-ignore: ['k8s/**', 'docs/**', '**.md']
  pull_request:
    branches: [main]
    paths-ignore: ['k8s/**', 'docs/**', '**.md']
  workflow_dispatch:
    inputs:
      rollout:
        description: Run kubectl rollout restart on pipelines-prod after push
        type: boolean
        default: true

concurrency:
  group: deploy-pipelines-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-west-2
  ECR_REPO: 228304386839.dkr.ecr.us-west-2.amazonaws.com/k8s/pipelines
  ECR_NAME: k8s/pipelines
  DEPLOYMENT: pipelines-prod
  NAMESPACE: prod

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      push: ${{ steps.r.outputs.push }}
      deploy: ${{ steps.r.outputs.deploy }}
      sha_tag: ${{ steps.r.outputs.sha_tag }}
    steps:
      - id: r
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_ROLLOUT: ${{ inputs.rollout }}
          ECR_REPO: ${{ env.ECR_REPO }}
          GIT_SHA: ${{ github.sha }}
          GITHUB_REF: ${{ github.ref }}
        run: |
          # push   = build + push the IMMUTABLE :sha tag (any main build; PR = build-only).
          # deploy = advance :prod + rollout — ONLY a workflow_dispatch with
          #          rollout, from main.
          #
          # CRITICAL: :prod is NEVER pushed in the build step. It is advanced ONLY
          # on the deploy path (see "Advance :prod tag"). So a plain merge to main
          # pushes only :sha and does NOT retag :prod, which means an incidental
          # pod restart (crash / OOM / HPA scale-up / node replace) under
          # imagePullPolicy: Always cannot pull an untested image in the window
          # between a merge and its deploy.
          PUSH="true"
          DEPLOY="false"
          [ "$EVENT_NAME" = "pull_request" ] && PUSH="false"
          [ "$GITHUB_REF" != "refs/heads/main" ] && PUSH="false"
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$INPUT_ROLLOUT" = "true" ] && [ "$GITHUB_REF" = "refs/heads/main" ]; then
            DEPLOY="true"
          fi
          SHA_TAG=""
          [ "$PUSH" = "true" ] && SHA_TAG="${ECR_REPO}:${GIT_SHA}"
          {
            echo "push=$PUSH"
            echo "deploy=$DEPLOY"
            echo "sha_tag=$SHA_TAG"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved: push=$PUSH deploy=$DEPLOY"

  build-and-deploy:
    needs: resolve
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Configure AWS credentials (OIDC)
        if: needs.resolve.outputs.push == 'true'
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: arn:aws:iam::228304386839:role/unbound-dev-gha-ci
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        if: needs.resolve.outputs.push == 'true'
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2

      - name: Build and push
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          file: Dockerfile
          push: ${{ needs.resolve.outputs.push == 'true' }}
          tags: ${{ needs.resolve.outputs.sha_tag }}
          cache-from: type=gha,scope=pipelines
          cache-to: type=gha,scope=pipelines,mode=max
          provenance: false

      - name: Wait for ECR image manifest
        if: needs.resolve.outputs.deploy == 'true'
        env:
          ECR_NAME: ${{ env.ECR_NAME }}
          GIT_SHA: ${{ github.sha }}
          AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          for i in $(seq 1 12); do
            if aws ecr describe-images --repository-name "$ECR_NAME" \
                --image-ids imageTag="$GIT_SHA" --region "$AWS_REGION" >/dev/null 2>&1; then
              echo "Image manifest visible ($ECR_NAME)"; exit 0
            fi
            echo "Waiting for ECR manifest (attempt $i/12)..."; sleep 5
          done
          echo "::warning::ECR manifest not visible after 60s — proceeding anyway"

      # Advance :prod ONLY here — after the image builds, before the rollout — by
      # copying the just-built :sha manifest onto the :prod tag (no rebuild). This
      # is the ONLY place :prod moves. A rollout right after picks it up; any
      # incidental restart before this step still pulls the previous :prod.
      - name: Advance :prod tag
        if: needs.resolve.outputs.deploy == 'true'
        env:
          ECR_NAME: ${{ env.ECR_NAME }}
          GIT_SHA: ${{ github.sha }}
          AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          MANIFEST=$(aws ecr batch-get-image --repository-name "$ECR_NAME" \
            --image-ids imageTag="$GIT_SHA" --region "$AWS_REGION" \
            --query 'images[0].imageManifest' --output text)
          if [ -z "$MANIFEST" ] || [ "$MANIFEST" = "None" ]; then
            echo "::error::could not read ${ECR_NAME}:${GIT_SHA} manifest — aborting before advancing :prod"; exit 1
          fi
          if OUT=$(aws ecr put-image --repository-name "$ECR_NAME" --image-tag prod \
                     --image-manifest "$MANIFEST" --region "$AWS_REGION" 2>&1); then
            echo "advanced :prod -> ${GIT_SHA}"
          elif echo "$OUT" | grep -q ImageAlreadyExistsException; then
            echo ":prod already points at ${GIT_SHA}"
          else
            echo "::error::failed to advance :prod — ${OUT}"; exit 1
          fi

      - name: Rollout (prod, dispatch-only)
        if: needs.resolve.outputs.deploy == 'true'
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          DEPLOYMENT: ${{ env.DEPLOYMENT }}
          NAMESPACE: ${{ env.NAMESPACE }}
        run: |
          if ! aws eks update-kubeconfig --name unbound-prod --region "${AWS_REGION}"; then
            echo "::error::aws eks update-kubeconfig failed for unbound-prod"; exit 1
          fi
          if ! kubectl rollout restart "deployment/${DEPLOYMENT}" -n "${NAMESPACE}"; then
            echo "::error::rollout restart failed for ${DEPLOYMENT} (auth/RBAC/not-found — NOT a timeout)"
            kubectl get events -n "${NAMESPACE}" --sort-by=.lastTimestamp | tail -20 || true
            exit 1
          fi
          # Hard-fail on non-convergence: by this point :prod has already advanced,
          # so a stuck rollout must surface as a FAILED deploy, not a green run
          # with unhealthy pods.
          if ! kubectl rollout status "deployment/${DEPLOYMENT}" -n "${NAMESPACE}" --timeout=10m; then
            echo "::error::rollout did NOT converge in 10m for ${DEPLOYMENT} — failing the deploy (:prod already advanced; investigate)."
            kubectl describe "deployment/${DEPLOYMENT}" -n "${NAMESPACE}" | tail -30 || true
            POD=$(kubectl -n "${NAMESPACE}" get pods -l app="${DEPLOYMENT}" --sort-by=.metadata.creationTimestamp -o jsonpath='{.items[-1].metadata.name}' 2>/dev/null || true)
            [ -n "$POD" ] && kubectl -n "${NAMESPACE}" logs "$POD" --tail=60 || true
            kubectl get pods -n "${NAMESPACE}" -l app="${DEPLOYMENT}" -o wide || true
            exit 1
          fi
          kubectl get pods -n "${NAMESPACE}" -l app="${DEPLOYMENT}" -o wide || true

      - name: Summary
        if: always()
        env:
          PUSH: ${{ needs.resolve.outputs.push }}
          DEPLOY: ${{ needs.resolve.outputs.deploy }}
          ECR_REPO: ${{ env.ECR_REPO }}
          GIT_SHA: ${{ github.sha }}
        run: |
          {
            echo "### pipelines (prod)"
            echo "- push: ${PUSH}, deploy: ${DEPLOY}"
            if [ "${PUSH}" = "true" ]; then
              echo "- image: \`${ECR_REPO}:${GIT_SHA}\` (immutable)"
            fi
            if [ "${DEPLOY}" = "true" ]; then
              echo "- \`:prod\` advanced to \`${GIT_SHA}\`, then rolled out"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
