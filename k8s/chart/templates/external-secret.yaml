{{- if .Values.externalSecret.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Release.Name }}-secrets
  labels:
    app: {{ .Release.Name }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval }}
  secretStoreRef:
    kind: {{ .Values.externalSecret.secretStoreRef.kind }}
    name: {{ .Values.externalSecret.secretStoreRef.name }}
  target:
    name: {{ .Release.Name }}-secrets
    creationPolicy: Owner
  {{- $remote := required "externalSecret.remoteKey is required when externalSecret.enabled=true" .Values.externalSecret.remoteKey }}
  data:
    {{- range .Values.externalSecret.secretKeys }}
    # remoteRef.property pins the exact SM key — if it's absent, ESO fails the
    # sync (secret not created -> pod won't start), so a missing key can never
    # silently fall back to the app's built-in default.
    - secretKey: {{ . }}
      remoteRef:
        key: {{ $remote | quote }}
        property: {{ . }}
    {{- end }}
{{- end }}
