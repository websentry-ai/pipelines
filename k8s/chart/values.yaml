# Default values for the pipelines chart.
# Per-environment overlays (dev/, prod/) override the env-specific bits.
#
# The deployed workload is start.sh -> uvicorn main:app on :8080 (Open WebUI
# Pipelines fork, FastAPI). STATELESS — no database, no redis, no migrations.
# Called ONLY in-cluster by ai-gateway / ai-gateway-data at /v1/perform_filters,
# so it is deployed PRIVATE (ClusterIP, NO ingress). It is an arbitrary-code
# plugin runtime, so it must never be publicly reachable. Touches no AWS
# resource at runtime — no IRSA.

replicaCount: 1

image:
  repository: 228304386839.dkr.ecr.us-west-2.amazonaws.com/k8s/pipelines
  tag: dev
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8080   # uvicorn --port 8080 (start.sh PORT default)

# PRIVATE service — no public ingress. The template is kept (gated) only so a
# future internal host could enable it; prod overlay keeps enabled: false.
ingress:
  enabled: false
  className: nginx
  host: ""
  tls: true
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod

# Secrets pulled from AWS Secrets Manager by ESO, injected via envFrom:
# secretRef. The SM value at remoteKey MUST be a JSON object:
#   { "PIPELINES_API_KEY": "..." }
# PIPELINES_API_KEY authenticates the /v1/perform_filters caller. It MUST come
# from the secret — never the app's insecure "0p3n-w3bu!" default (config.py).
# Non-secret config (PORT/HOST/PIPELINES_DIR) lives in the `env:` block below so
# it's version-controlled. On key collision env: wins over envFrom: secretRef.
# Default ON so the pod always gets PIPELINES_API_KEY from Secrets Manager —
# never the app's built-in "0p3n-w3bu!" fallback. remoteKey is required per env
# (see external-secret.yaml); each overlay sets it (prod/pipelines, dev/pipelines).
externalSecret:
  enabled: true
  remoteKey: ""
  # Exact SM properties to pull. A missing property fails ESO sync (the pod
  # won't start) rather than silently letting the app use its default key.
  secretKeys:
    - PIPELINES_API_KEY
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager

# Non-secret env. PIPELINES_API_KEY comes from ESO. HOST/PORT match start.sh
# defaults; PIPELINES_DIR is the in-image plugin directory (baked into the
# image, stateless).
env:
  - name: PORT
    value: "8080"
  - name: HOST
    value: "0.0.0.0"
  - name: PIPELINES_DIR
    value: "./pipelines"

podAnnotations: {}

# Sized for the workload: the Open WebUI Pipelines image installs torch +
# transformers + opencv, and modules load at startup. Underestimate and pods
# OOM during init.
resources:
  requests:
    cpu: "500m"
    memory: "1Gi"
  limits:
    cpu: "2"
    memory: "4Gi"

# Container hardening. NOT runAsNonRoot — the image runs as root and pip-installs
# / writes to PIPELINES_DIR at runtime, so forcing a non-root uid would break it.
# But drop all Linux capabilities, block privilege escalation, and pin the
# default seccomp profile — meaningful defense for a plugin-execution service
# without breaking its root writes.
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]
  seccompProfile:
    type: RuntimeDefault

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 2
  targetCPUUtilizationPercentage: 75
  targetMemoryUtilizationPercentage: 75

# Don't drop capacity during deploys — model load is slow, so a fresh pod takes
# a while to be Ready.
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

revisionHistoryLimit: 3

# Generous startup probe: module load (torch + transformers + opencv) can take
# minutes on cold start. 30 * 10s = 5 min before the kubelet gives up. Probes
# hit GET / (get_status → unauthenticated 200 {"status": true}); no authed path
# is probed.
startupProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 10
  timeoutSeconds: 5
  periodSeconds: 10
  failureThreshold: 30

readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 5
  timeoutSeconds: 3
  periodSeconds: 10
  failureThreshold: 5

livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 15
  timeoutSeconds: 3
  periodSeconds: 10
  failureThreshold: 5
