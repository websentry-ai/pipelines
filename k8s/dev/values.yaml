# Dev overlay for pipelines.
# Pulls runtime env vars from AWS Secrets Manager key dev/pipelines via the
# aws-secrets-manager ClusterSecretStore (already deployed in dev EKS).
#
# Base chart defaults already match dev expectations (image.tag "dev",
# service.port 8080, ingress disabled, resources sized for ML workload).
# Overlay carries only what differs from base.

# Held off in dev until health stabilises — service not required to be
# operational yet. Flip back to 1 (or remove this line) to bring it up.
replicaCount: 0

image:
  repository: 228304386839.dkr.ecr.us-west-2.amazonaws.com/k8s/pipelines

externalSecret:
  enabled: true
  remoteKey: dev/pipelines

# Dev is held off — 0 replicas AND HPA disabled, so neither the base default
# replicaCount (1) nor the base default HPA scales a pod back up.
replicaCount: 0
autoscaling:
  enabled: false
