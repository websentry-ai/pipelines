# Production overlay for pipelines. Secret: prod/pipelines (SM JSON object with
# PIPELINES_API_KEY). PRIVATE service — reached only in-cluster at
# pipelines-prod:8080 by ai-gateway / ai-gateway-data. NO public ingress, NO DNS.

image:
  tag: prod

externalSecret:
  enabled: true
  remoteKey: prod/pipelines
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager

# PRIVATE backend — no public ingress. It's an arbitrary-code plugin runtime and
# must never be publicly reachable; callers are in-cluster only.
ingress:
  enabled: false

# SLEPT 2026-07 — pipelines has no live entrypoint (the FE flow that adds filter
# cases for NSFW/hate-speech/etc. is disabled, so enabled_filters is always empty
# and the service is never meaningfully invoked). Scaled to 0 to save cost. Its
# in-cluster callers (ai-gateway, gateway-data web+celery) are being disabled in
# parallel — UNBOUND_PIPELINES_URL removed from their env so they skip the call
# cleanly (no fail-open timeout). To WAKE: set replicaCount back to 1 (or
# autoscaling.enabled: true) AND restore UNBOUND_PIPELINES_URL in the consumers.
replicaCount: 0
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 2

# Non-secret env. PIPELINES_API_KEY comes from ESO (prod/pipelines).
env:
  - name: PORT
    value: "8080"
  - name: HOST
    value: "0.0.0.0"
  - name: PIPELINES_DIR
    value: "./pipelines"

# Memory raised 1Gi -> 3Gi (limit kept 4Gi). pipelines-prod uses ~1978Mi = 193%
# of the old 1Gi request, so under node memory pressure the kubelet evicted it
# repeatedly (27 evicted zombie pods piled up), and its memory-based HPA read
# ~193%/75% and stayed pinned at max. 3Gi request stops the evictions and lets
# the HPA scale on real load. CPU unchanged (500m/2 from the chart default).
resources:
  requests:
    cpu: "900m"
    memory: "3Gi"
  limits:
    cpu: "2"
    memory: "4Gi"
