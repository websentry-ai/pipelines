# Production overlay for pipelines. Secret: prod/pipelines (SM JSON object with
# PIPELINES_API_KEY). PRIVATE service — reached only in-cluster at
# pipelines-prod:8080 by ai-gateway / ai-gateway-data. NO public ingress, NO DNS.

image:
  tag: prod

externalSecret:
  enabled: true
  remoteKey: prod/pipelines
  # All secret keys pulled from the prod/pipelines SM JSON. Each is mapped by
  # remoteRef.property (exact key) — a missing property fails ESO sync so the pod
  # won't start with a half-populated secret. Overrides the base list (which is
  # just PIPELINES_API_KEY); Helm replaces the list, not merges.
  #   PIPELINES_API_KEY        - authenticates the /v1/perform_filters caller
  #   GOOGLE_*                 - Vertex AI service-account creds for the
  #                              document_classifier filter (get_access_token)
  #   API_KEY                  - X-API-KEY the logging_pipeline sends to
  #                              gateway-data graphql (else the log POST is 401'd)
  secretKeys:
    - PIPELINES_API_KEY
    - GOOGLE_CLIENT_EMAIL
    - GOOGLE_PRIVATE_KEY
    - GOOGLE_PRIVATE_KEY_ID
    - GOOGLE_PROJECT_ID
    - GOOGLE_REGION
    - GOOGLE_ENDPOINT_ID
    - API_KEY
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager

# PRIVATE backend — no public ingress. It's an arbitrary-code plugin runtime and
# must never be publicly reachable; callers are in-cluster only.
ingress:
  enabled: false

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 2

# Non-secret env. Secret values (PIPELINES_API_KEY, GOOGLE_*, API_KEY) come from
# ESO (prod/pipelines) via envFrom. The vars below are non-sensitive config /
# labels — safe in git.
#   LOG_URL          - where logging_pipeline POSTs prompts. Internal gateway-data
#                      graphql (matches ai-gateway's own rewrite target). Without
#                      it the app defaults to localhost:8000 and logging no-ops.
#   AI_MODEL_NAME    - fallback model label only; body.model wins per request.
#   FUNCTIONALITY /  - static labels stamped on every logged row. Defaults are
#   APPLICATION_NAME   "chat" / "chat-ui"; set them here to match Porter if the
#                      log labels need to stay identical (uncomment + fill).
env:
  - name: PORT
    value: "8080"
  - name: HOST
    value: "0.0.0.0"
  - name: PIPELINES_DIR
    value: "./pipelines"
  - name: LOG_URL
    value: "http://gateway-data-prod.prod.svc.cluster.local:8080/graphql/"
  # - name: AI_MODEL_NAME
  #   value: ""        # copy Porter's value if not the gpt-4o default
  # - name: FUNCTIONALITY
  #   value: ""        # copy Porter's value if not the "chat" default
  # - name: APPLICATION_NAME
  #   value: ""        # copy Porter's value if not the "chat-ui" default
